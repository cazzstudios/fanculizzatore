name: Fetch Latest Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: fetch-release
  cancel-in-progress: true

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ASSETS_ACCESS_TOKEN }}

      - name: Fetch latest release
        run: |
          mkdir -p _data
          mkdir -p downloads
          mkdir -p downloads/.tmp

          # Use ASSETS_ACCESS_TOKEN for accessing the private repository
          # Fallback to GITHUB_TOKEN if ASSETS_ACCESS_TOKEN is not set
          ASSETS_TOKEN="${{ secrets.ASSETS_ACCESS_TOKEN }}"
          if [ -z "$ASSETS_TOKEN" ]; then
            echo "Warning: ASSETS_ACCESS_TOKEN not set, falling back to GITHUB_TOKEN"
            ASSETS_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          else
            echo "ASSETS_ACCESS_TOKEN is set"
          fi

          # Fetch only the latest release
          echo "Fetching release from private repo..."
          if ! curl -s -f -H "Authorization: token $ASSETS_TOKEN" \
            https://api.github.com/repos/cazzstudios/fanculizzatore-source/releases/latest > /tmp/release.json; then
            echo "Error: Failed to fetch release from API"
            exit 1
          fi

          # Check if we got a valid release
          TAG="$(jq -r '.tag_name // empty' /tmp/release.json)"
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo '{"tag": "", "notes": "", "artifacts": []}' > _data/latest-release.json
            exit 0
          fi

          # Check if release has changed (skip if tag matches existing)
          if [ -f "_data/latest-release.json" ]; then
            EXISTING_TAG="$(jq -r '.tag // empty' _data/latest-release.json)"
            if [ "$EXISTING_TAG" = "$TAG" ]; then
              echo "Release unchanged: $TAG"
              exit 0
            fi
            echo "Release changed: $EXISTING_TAG -> $TAG"
          fi

          # Clean up old binaries before downloading new ones
          echo "Cleaning up old binaries..."
          rm -f downloads/*.apk downloads/*.exe downloads/*.deb downloads/*.rpm 2>/dev/null

          NOTES="$(jq -r '.body // ""' /tmp/release.json)"

          # Get filtered assets with ID and browser_download_url
          FILTERED_ASSETS_JSON="$(jq '[.assets[] | select(.name | endswith(".apk") or endswith(".exe") or endswith(".deb") or endswith(".rpm")) | {id: .id, name: .name, size: .size, download_url: .browser_download_url}]' /tmp/release.json)"

          # Initialize artifacts array
          ARTIFACTS_JSON="[]"

          # Process each filtered asset if any exist
          ASSET_COUNT="$(echo "$FILTERED_ASSETS_JSON" | jq -r 'length')"
          if [ "$ASSET_COUNT" -gt 0 ]; then
            # Download each asset using GitHub API (to ensure we can access private assets)
            for i in $(seq 0 $((ASSET_COUNT - 1))); do
              # Extract asset properties
              ID="$(echo "$FILTERED_ASSETS_JSON" | jq -r ".[$i].id")"
              NAME="$(echo "$FILTERED_ASSETS_JSON" | jq -r ".[$i].name")"
              SIZE="$(echo "$FILTERED_ASSETS_JSON" | jq -r ".[$i].size")"

              echo "Downloading $NAME (ID: $ID, expected size: $SIZE)..."

              # Download to .tmp/ first for atomic operation
              curl -s -f -L -H "Authorization: token $ASSETS_TOKEN" -H "Accept: application/octet-stream" \
                "https://api.github.com/repos/cazzstudios/fanculizzatore-source/releases/assets/$ID" \
                -o "downloads/.tmp/$NAME" || {
                  echo "Warning: Failed to download $NAME"
                  rm -f "downloads/.tmp/$NAME"
                  continue
                }

              # Verify file size matches expected
              ACTUAL_SIZE=$(stat -c%s "downloads/.tmp/$NAME" 2>/dev/null || echo "0")
              if [ "$ACTUAL_SIZE" != "$SIZE" ]; then
                echo "Error: Size mismatch for $NAME (expected: $SIZE, got: $ACTUAL_SIZE)"
                rm -f "downloads/.tmp/$NAME"
                continue
              fi

              # Move to final location atomically
              mv "downloads/.tmp/$NAME" "downloads/$NAME"

              # Add to artifacts array for JSON
              ARTIFACTS_JSON=$(echo "$ARTIFACTS_JSON" | jq --arg name "$NAME" --arg size "$SIZE" --arg url "downloads/$NAME" '. + [{name: $name, size: ($size|tonumber), download_url: $url}]')
            done
          fi

          # Create final JSON by constructing the complete object
          jq -n \
            --arg tag "$TAG" \
            --arg notes "$NOTES" \
            --argjson artifacts "$ARTIFACTS_JSON" \
            '{tag: $tag, notes: $notes, artifacts: $artifacts}' > _data/latest-release.json

      - name: Clean up empty downloads directory
        run: |
          # Remove downloads directory if empty (git doesn't track empty dirs)
          if [ -d "downloads" ] && [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            rmdir downloads
          fi
          # Clean up .tmp directory if exists
          if [ -d "downloads/.tmp" ]; then
            rmdir downloads/.tmp 2>/dev/null || true
          fi

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update latest release data"
          file_pattern: "downloads/ _data/"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com"
